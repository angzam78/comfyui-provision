version: 1

extensions:
  - module: provisioner_comfyui
    config:
      comfyui_dir: "${WORKSPACE:-/workspace}/ComfyUI"

apt_packages:
  - libsndfile1
  - ffmpeg
  # - libgl1
  # - libglx-mesa0
  # - libglib2.0-0
  # - libgomp1

pip_packages:
  packages:
    - soundfile
    - imageio-ffmpeg
    # - nvidia-ml-py
    # - 'kornia>=0.7.3,<0.8.0'

git_repos:
  - url: "https://github.com/ltdrdata/ComfyUI-Manager.git"
    dest: "${WORKSPACE:-/workspace}/ComfyUI/custom_nodes/ComfyUI-Manager"

  - url: "https://github.com/crystian/ComfyUI-Crystools.git"
    dest: "${WORKSPACE:-/workspace}/ComfyUI/custom_nodes/ComfyUI-Crystools"

  - url: "https://github.com/slahiri/ComfyUI-Workflow-Models-Downloader.git"
    dest: "${WORKSPACE:-/workspace}/ComfyUI/custom_nodes/ComfyUI-Workflow-Models-Downloader"

  - url: "https://github.com/angzam78/ComfyUI-Model-Location-Editor.git"
    dest: "${WORKSPACE:-/workspace}/ComfyUI/custom_nodes/ComfyUI-Model-Location-Editor"

post_commands:
  - |
    # Do not download any models during provisioning
    unset PROVISIONING_COMFYUI_WORKFLOWS
  
    # Create ephemeral directories in shared memory
    base="${WORKSPACE:-/workspace}/ComfyUI"
    
    for d in input output temp; do
      mkdir -p "/dev/shm/comfyui/$d"
      rm -rf "$base/$d"
      ln -s "/dev/shm/comfyui/$d" "$base/$d"
    done
    
    mkdir -p /dev/shm/comfyui/workflows
    rm -rf "$base/user/default/workflows"
    ln -s /dev/shm/comfyui/workflows "$base/user/default/workflows"

    # Restore ComfyUI-Manager dependencies
    /venv/main/bin/python3 ${WORKSPACE:-/workspace}/ComfyUI/custom_nodes/ComfyUI-Manager/cm-cli.py restore-dependencies
